<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Just canban</title>
</head>
<body>
    <header class="header_place">
        <div class="top_line_block">
            <div class="top_line_left">
                <img class="top_left_logo" src="/frontend/sources/alt.png" alt="пока нету">
            </div>
            <div class="top_line_right">
                <a href="" class="button">Настройки</a>
                <a href="" class="button">Войти</a>
                <a class="hidden" href="">Профиль</a>
            </div>
        </div>
    </header>
    <main>
        <div class="main_part">
            <div class="left_menu"></div>
            <div class="Tables">
                <div class="todo_table">
                    <div class="todo_cards">
                        <div class="card_zone">
                            <div class="card">
                                <div class="card_name_zone">
                                    <div class="card_name">
                                        Тестовая карточка
                                    </div>
                                </div>
                                <div class="card_bottom_zone">
                                    <div class="for_who_zone">
                                        <img class="for_who" src="/frontend/sources/tester.png">
                                    </div>
                                    <div class="from_who_zone">
                                        <img class="from_who" src="/frontend/sources/admin.png">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="in_progress_table"></div>
                    <div class="in_progress_cards">

                    </div>
                <div class="done_table">
                    <div class="done_cards"></div>
                </div>
            </div>
        </div>
    </main>
    <footer>
    </footer>
</body>
</html>
